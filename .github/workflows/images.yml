name: Container images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code:
    name: Code checks
    uses: ./.github/workflows/ci.yml

  images:
    name: ${{ matrix.name }} image
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Hearth
            image: ghcr.io/kiln-site/hearth
            dockerfile: apps/web/Dockerfile
            cache_scope: hearth
            build_args: |
              SOURCE_COMMIT=${{ github.sha }}
              VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN }}
              VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE=${{ vars.VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE || '0.1' }}
              VITE_SENTRY_TRACES_SAMPLE_RATE=${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE || '0.1' }}
            uses_sentry: true
          - name: Relay
            image: ghcr.io/kiln-site/relay
            dockerfile: apps/relay/Dockerfile
            cache_scope: relay
            build_args: |
              SOURCE_COMMIT=${{ github.sha }}
            uses_sentry: false
    uses: ./.github/workflows/reusable-image.yml
    with:
      name: ${{ matrix.name }}
      image: ${{ matrix.image }}
      dockerfile: ${{ matrix.dockerfile }}
      cache_scope: ${{ matrix.cache_scope }}
      build_args: ${{ matrix.build_args }}
      uses_sentry: ${{ matrix.uses_sentry }}
    secrets:
      sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}

  deploy:
    name: Deploy ${{ matrix.name }} to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [code, images]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Hearth
            component: hearth
          - name: Relay
            component: relay
    steps:
      - name: Trigger rolling deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_WEBHOOK: ${{ matrix.component == 'hearth' && secrets.COOLIFY_WEBHOOK_HEARTH || secrets.COOLIFY_WEBHOOK_RELAY }}
        run: |
          curl --fail-with-body --show-error --silent \
            --request GET \
            "$COOLIFY_WEBHOOK" \
            --header "Authorization: Bearer $COOLIFY_TOKEN"
