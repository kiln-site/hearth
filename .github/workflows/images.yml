name: Container images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code:
    name: Code checks
    uses: ./.github/workflows/ci.yml

  image:
    name: ${{ matrix.name }}${{ matrix.architecture == 'arm64' && ' · arm64' || '' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        component:
          - hearth
          - relay
          - ember-java11
          - ember-java17
          - ember-java21
          - ember-java25
        architecture: ${{ fromJSON(github.event_name == 'pull_request' && '["amd64"]' || '["amd64", "arm64"]') }}
        include:
          - architecture: amd64
            runner: blacksmith-4vcpu-ubuntu-2404
            platform: linux/amd64
          - architecture: arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
            platform: linux/arm64
          - component: hearth
            name: Hearth
            image: ghcr.io/kiln-site/hearth
            file: apps/web/Dockerfile
            channel: latest
            version_suffix: ""
            build_args: |
              SOURCE_COMMIT=${{ github.sha }}
              VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN }}
              VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE=${{ vars.VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE || '0.1' }}
              VITE_SENTRY_TRACES_SAMPLE_RATE=${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE || '0.1' }}
            cache_scope: hearth
          - component: relay
            name: Relay
            image: ghcr.io/kiln-site/relay
            file: apps/relay/Dockerfile
            channel: latest
            version_suffix: ""
            build_args: ""
            cache_scope: relay
          - component: ember-java11
            name: Ember · Java 11
            image: ghcr.io/kiln-site/ember
            file: apps/ember/Dockerfile
            channel: java11
            version_suffix: -java11
            build_args: JAVA_VERSION=11
            cache_scope: ember-java11
          - component: ember-java17
            name: Ember · Java 17
            image: ghcr.io/kiln-site/ember
            file: apps/ember/Dockerfile
            channel: java17
            version_suffix: -java17
            build_args: JAVA_VERSION=17
            cache_scope: ember-java17
          - component: ember-java21
            name: Ember · Java 21
            image: ghcr.io/kiln-site/ember
            file: apps/ember/Dockerfile
            channel: java21
            version_suffix: -java21
            build_args: JAVA_VERSION=21
            cache_scope: ember-java21
          - component: ember-java25
            name: Ember · Java 25
            image: ghcr.io/kiln-site/ember
            file: apps/ember/Dockerfile
            channel: java25
            version_suffix: -java25
            build_args: JAVA_VERSION=25
            cache_scope: ember-java25

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ matrix.image }}
          flavor: latest=false
          tags: |
            type=raw,value=${{ matrix.channel }},enable={{is_default_branch}}
            type=sha,prefix=sha-,suffix=${{ matrix.version_suffix }}
            type=semver,pattern={{version}},suffix=${{ matrix.version_suffix }}

      - name: Build${{ github.event_name != 'pull_request' && ' and publish' || '' }} image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build_args }}
          secrets: |
            SENTRY_AUTH_TOKEN=${{ matrix.component == 'hearth' && matrix.architecture == 'amd64' && secrets.SENTRY_AUTH_TOKEN || '' }}
          platforms: ${{ matrix.platform }}
          outputs: ${{ github.event_name != 'pull_request' && format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true', matrix.image) || '' }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}-${{ matrix.architecture }}
          cache-to: type=gha,mode=min,scope=${{ matrix.cache_scope }}-${{ matrix.architecture }}
          provenance: mode=max
          sbom: true

      - name: Export image digest
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          test -n "$DIGEST"
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload image digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.cache_scope }}-${{ matrix.architecture }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish ${{ matrix.name }} manifest
    if: github.event_name != 'pull_request'
    needs: image
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        component:
          - hearth
          - relay
          - ember-java11
          - ember-java17
          - ember-java21
          - ember-java25
        include:
          - component: hearth
            name: Hearth
            image: ghcr.io/kiln-site/hearth
            channel: latest
            version_suffix: ""
            cache_scope: hearth
          - component: relay
            name: Relay
            image: ghcr.io/kiln-site/relay
            channel: latest
            version_suffix: ""
            cache_scope: relay
          - component: ember-java11
            name: Ember · Java 11
            image: ghcr.io/kiln-site/ember
            channel: java11
            version_suffix: -java11
            cache_scope: ember-java11
          - component: ember-java17
            name: Ember · Java 17
            image: ghcr.io/kiln-site/ember
            channel: java17
            version_suffix: -java17
            cache_scope: ember-java17
          - component: ember-java21
            name: Ember · Java 21
            image: ghcr.io/kiln-site/ember
            channel: java21
            version_suffix: -java21
            cache_scope: ember-java21
          - component: ember-java25
            name: Ember · Java 25
            image: ghcr.io/kiln-site/ember
            channel: java25
            version_suffix: -java25
            cache_scope: ember-java25

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-${{ matrix.cache_scope }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ matrix.image }}
          flavor: latest=false
          tags: |
            type=raw,value=${{ matrix.channel }},enable={{is_default_branch}}
            type=sha,prefix=sha-,suffix=${{ matrix.version_suffix }}
            type=semver,pattern={{version}},suffix=${{ matrix.version_suffix }}

      - name: Create and verify multi-platform manifest
        env:
          IMAGE: ${{ matrix.image }}
          METADATA: ${{ steps.metadata.outputs.json }}
        run: |
          mapfile -t tags < <(jq -r '.tags[]' <<< "$METADATA")
          test "${#tags[@]}" -gt 0

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(--tag "$tag")
          done

          sources=()
          for digest_file in /tmp/digests/*; do
            sources+=("$IMAGE@sha256:$(basename "$digest_file")")
          done
          test "${#sources[@]}" -eq 2

          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"
          docker buildx imagetools inspect "${tags[0]}"

  deploy-hearth:
    name: Deploy Hearth to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [code, publish]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Trigger Coolify rolling deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
        run: |
          curl --fail-with-body --show-error --silent \
            --request GET \
            "$COOLIFY_WEBHOOK" \
            --header "Authorization: Bearer $COOLIFY_TOKEN"
