name: Code checks

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  code:
    name: Check, test, and build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          cache: true
          node-version-file: .node-version
          run-install: |
            - cwd: .
              args: ["--frozen-lockfile"]

      - name: Typecheck
        run: vp run -r typecheck

      - name: Check lint and types
        run: vp check

      - name: Test retained critical behavior
        run: vp run -r test

      - name: Build
        run: vp run -r build

      - name: Verify generated routes are current
        run: git diff --exit-code -- apps/web/src/routeTree.gen.ts
