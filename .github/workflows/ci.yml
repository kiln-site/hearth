name: Code checks

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  code:
    name: ${{ matrix.name }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Static checks
            command: |
              vp run -r typecheck
              vp check
          - name: Tests
            command: vp run -r test
          - name: Build
            command: |
              vp run -r build
              git diff --exit-code -- apps/web/src/routeTree.gen.ts
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          cache: true
          node-version-file: .node-version
          run-install: |
            - cwd: .
              args: ["--frozen-lockfile"]

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
