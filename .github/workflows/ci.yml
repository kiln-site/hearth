name: Code checks

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  code:
    name: Typecheck, lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Ember entrypoint
        run: bash -n apps/ember/ember.sh

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test keyring
        run: pnpm --filter web test:keyring

      - name: Build
        run: pnpm build

      - name: Verify generated routes are current
        run: git diff --exit-code -- apps/web/src/routeTree.gen.ts
