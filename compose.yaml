services:
  ember-java11:
    image: ghcr.io/kiln-site/ember:java11
    profiles: ["images"]
    build:
      context: .
      dockerfile: apps/ember/Dockerfile
      args:
        JAVA_VERSION: "11"

  ember-java17:
    image: ghcr.io/kiln-site/ember:java17
    profiles: ["images"]
    build:
      context: .
      dockerfile: apps/ember/Dockerfile
      args:
        JAVA_VERSION: "17"

  ember-java21:
    image: ghcr.io/kiln-site/ember:java21
    profiles: ["images"]
    build:
      context: .
      dockerfile: apps/ember/Dockerfile
      args:
        JAVA_VERSION: "21"

  ember-java25:
    image: ghcr.io/kiln-site/ember:java25
    profiles: ["images"]
    build:
      context: .
      dockerfile: apps/ember/Dockerfile
      args:
        JAVA_VERSION: "25"

  ember-palworld:
    image: ghcr.io/kiln-site/ember:palworld
    platform: linux/amd64
    profiles: ["images"]
    build:
      context: .
      dockerfile: apps/ember-palworld/Dockerfile

  cache:
    image: ${KILN_CACHE_IMAGE:-valkey/valkey:9.1.0-alpine}
    restart: unless-stopped
    command:
      - /bin/sh
      - -ec
      - |
        if command -v valkey-server >/dev/null; then
          exec valkey-server --save "" --appendonly no
        fi
        exec redis-server --save "" --appendonly no
    tmpfs:
      - /data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if command -v valkey-cli >/dev/null; then valkey-cli ping; else redis-cli ping; fi | grep -q PONG",
        ]
      interval: 3s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-hearth}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: kiln-root
      MYSQL_USER: ${DB_USERNAME:-kiln}
      TZ: America/New_York
    volumes:
      - hearth-mysql:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -u"$${MYSQL_USER}" -p"$${MYSQL_PASSWORD}"',
        ]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:3306:3306"

  relay:
    image: ghcr.io/kiln-site/relay:latest
    build:
      context: .
      dockerfile: apps/relay/Dockerfile
    restart: unless-stopped
    environment:
      KILN_RELAY_KEY: ${KILN_RELAY_KEY:?Set KILN_RELAY_KEY in .env}
      KILN_RELAY_PORT: ${KILN_RELAY_PORT:-4100}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    ports:
      - "${KILN_RELAY_PORT:-4100}:${KILN_RELAY_PORT:-4100}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - relay-data:/data

  hearth:
    image: ghcr.io/kiln-site/hearth:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE:-0.1}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
    restart: unless-stopped
    depends_on:
      cache:
        condition: service_healthy
      mysql:
        condition: service_healthy
      relay:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-hearth}
      DB_USERNAME: ${DB_USERNAME:-kiln}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_TABLE_PREFIX: ${DB_TABLE_PREFIX:-}
      KILN_ENVIRONMENT: ${KILN_ENVIRONMENT:-prod}
      KILN_CACHE_URL: ${KILN_CACHE_URL:-redis://cache:6379}
      KILN_CACHE_NAMESPACE: ${KILN_CACHE_NAMESPACE:-}
      KILN_ENABLE_SIGNUPS: ${KILN_ENABLE_SIGNUPS:-false}
      KILN_RELAY_KEY: ${KILN_RELAY_KEY:?Set KILN_RELAY_KEY in .env}
      KILN_RELAY_NAME: ${KILN_RELAY_NAME:-Local Relay}
      KILN_RELAY_URL: http://relay:${KILN_RELAY_PORT:-4100}
      KILN_SUPER_USER_EMAIL: ${KILN_SUPER_USER_EMAIL:-}
      KILN_SUPER_USER_PASSWORD: ${KILN_SUPER_USER_PASSWORD:-}
      KILN_URL: ${KILN_URL:-http://localhost:3000}
      BETTER_AUTH_SECRETS: ${BETTER_AUTH_SECRETS:?Set BETTER_AUTH_SECRETS in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    ports:
      - "3000:3000"

volumes:
  hearth-mysql:
  relay-data:
