services:
  cache:
    image: ${CACHE_IMAGE:-valkey/valkey:9.1.0-alpine}
    restart: unless-stopped
    command:
      - /bin/sh
      - -ec
      - |
        if command -v valkey-server >/dev/null; then
          exec valkey-server --save "" --appendonly no
        fi
        exec redis-server --save "" --appendonly no
    tmpfs:
      - /data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if command -v valkey-cli >/dev/null; then valkey-cli ping; else redis-cli ping; fi | grep -q PONG",
        ]
      interval: 3s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-hearth}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: kiln-root
      MYSQL_USER: ${DB_USERNAME:-kiln}
      TZ: America/New_York
    volumes:
      - hearth-mysql:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -u"$${MYSQL_USER}" -p"$${MYSQL_PASSWORD}"',
        ]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:3306:3306"

  relay:
    image: ghcr.io/kiln-site/relay:latest
    build:
      context: .
      dockerfile: apps/relay/Dockerfile
    restart: unless-stopped
    environment:
      KILN_RELAY_BOOTSTRAP_TOKEN: ${KILN_RELAY_BOOTSTRAP_TOKEN:-}
      KILN_RELAY_BOOTSTRAP_TOKEN_FILE: ${KILN_RELAY_BOOTSTRAP_TOKEN_FILE:-}
      KILN_RELAY_HOST: ${KILN_RELAY_HOST:-relay.hearth.orb.local}
      KILN_RELAY_NAME: ${KILN_RELAY_NAME:-}
      KILN_RELAY_PORT: ${KILN_RELAY_PORT:-4100}
      KILN_RELAY_PUBLIC_PORT: ${KILN_RELAY_PUBLIC_PORT:-}
      KILN_RELAY_DISCOVER_PUBLIC_IP: ${KILN_RELAY_DISCOVER_PUBLIC_IP:-true}
      KILN_RELAY_SFTP_PORT: ${KILN_RELAY_SFTP_PORT:-2022}
      KILN_RELAY_TLS_MODE: ${KILN_RELAY_TLS_MODE:-managed}
      KILN_RELAY_TLS_CERT_FILE: ${KILN_RELAY_TLS_CERT_FILE:-}
      KILN_RELAY_TLS_KEY_FILE: ${KILN_RELAY_TLS_KEY_FILE:-}
      KILN_BRICKS_CATALOG_URL: ${KILN_BRICKS_CATALOG_URL:-https://raw.githubusercontent.com/kiln-site/bricks/main/catalog.yml}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    ports:
      - "${KILN_RELAY_PORT:-4100}:${KILN_RELAY_PORT:-4100}"
      - "${KILN_RELAY_SFTP_PORT:-2022}:${KILN_RELAY_SFTP_PORT:-2022}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - relay-data:/data

  hearth:
    image: ghcr.io/kiln-site/hearth:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE:-0.1}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
    restart: unless-stopped
    depends_on:
      cache:
        condition: service_healthy
      mysql:
        condition: service_healthy
      relay:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-hearth}
      DB_USERNAME: ${DB_USERNAME:-kiln}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_TABLE_PREFIX: ${DB_TABLE_PREFIX:-}
      KILN_ENVIRONMENT: ${KILN_ENVIRONMENT:-prod}
      CACHE_HOST: ${CACHE_HOST:-cache}
      CACHE_PORT: ${CACHE_PORT:-6379}
      CACHE_USERNAME: ${CACHE_USERNAME:-}
      CACHE_PASSWORD: ${CACHE_PASSWORD:-}
      CACHE_DATABASE: ${CACHE_DATABASE:-0}
      CACHE_TLS: ${CACHE_TLS:-false}
      KILN_ENABLE_SIGNUPS: ${KILN_ENABLE_SIGNUPS:-false}
      KILN_RELAY_BOOTSTRAP_TOKEN: ${KILN_RELAY_BOOTSTRAP_TOKEN:-}
      KILN_RELAY_HOST: ${KILN_RELAY_HOST:-relay.hearth.orb.local}
      KILN_RELAY_PORT: ${KILN_RELAY_PORT:-4100}
      KILN_SUPER_USER_EMAIL: ${KILN_SUPER_USER_EMAIL:-}
      KILN_SUPER_USER_PASSWORD: ${KILN_SUPER_USER_PASSWORD:-}
      KILN_URL: ${KILN_URL:-http://localhost:3000}
      BETTER_AUTH_SECRETS: ${BETTER_AUTH_SECRETS:?Set BETTER_AUTH_SECRETS in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    ports:
      - "3000:3000"

volumes:
  hearth-mysql:
  relay-data:
