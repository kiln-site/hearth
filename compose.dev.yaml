services:
  hearth:
    build: !reset null
    image: node:24-alpine
    restart: "no"
    working_dir: /workspace
    depends_on:
      mysql:
        condition: service_healthy
      relay:
        condition: service_healthy
    environment:
      NODE_ENV: development
      KILN_ENVIRONMENT: dev
      KILN_SENTRY_VERIFICATION_TOKEN: ${KILN_SENTRY_VERIFICATION_TOKEN:-}
    command:
      - /bin/sh
      - -lc
      - |
        corepack enable
        pnpm install --frozen-lockfile --ignore-scripts --filter web...
        pnpm rebuild esbuild
        pnpm --filter @workspace/contracts build
        pnpm --filter web db:migrate
        exec pnpm --filter web dev --host 0.0.0.0
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health',{signal:AbortSignal.timeout(2500)}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 6
    volumes: !override
      - .:/workspace
      - hearth-dev-node-modules:/workspace/node_modules
      - hearth-dev-web-node-modules:/workspace/apps/web/node_modules
      - hearth-dev-contracts-node-modules:/workspace/packages/contracts/node_modules
      - hearth-dev-ui-node-modules:/workspace/packages/ui/node_modules
      - hearth-dev-pnpm-store:/root/.local/share/pnpm/store

volumes:
  hearth-dev-node-modules:
  hearth-dev-web-node-modules:
  hearth-dev-contracts-node-modules:
  hearth-dev-ui-node-modules:
  hearth-dev-pnpm-store:
