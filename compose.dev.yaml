services:
  relay:
    build: !reset null
    image: node:24-alpine
    restart: "no"
    working_dir: /workspace
    environment:
      NODE_ENV: development
      KILN_RELAY_TLS_MODE: managed
      KILN_RELAY_NAME: L01
    command:
      - /bin/sh
      - -lc
      - |
        apk add --no-cache docker-cli docker-cli-compose
        corepack enable
        pnpm install --frozen-lockfile --ignore-scripts --filter relay...
        pnpm rebuild esbuild
        if [ ! -f packages/contracts/dist/index.js ] || [ packages/contracts/src/index.ts -nt packages/contracts/dist/index.js ]; then
          pnpm --filter @workspace/contracts exec vp pack
        fi
        exec pnpm --filter relay dev
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const check=(m,f)=>m.get({host:'127.0.0.1',port:4100,path:'/health',rejectUnauthorized:false,timeout:2500},r=>process.exit(r.statusCode===204?0:1)).on('error',f);check(require('node:http'),()=>check(require('node:https'),()=>process.exit(1)))",
        ]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 6
    volumes: !override
      - /var/run/docker.sock:/var/run/docker.sock
      - relay-data:/data
      - .:/workspace
      - relay-dev-node-modules:/workspace/node_modules
      - relay-dev-app-node-modules:/workspace/apps/relay/node_modules
      - relay-dev-contracts-node-modules:/workspace/packages/contracts/node_modules
      - relay-dev-pnpm-store:/root/.local/share/pnpm/store

  hearth:
    build: !reset null
    image: node:24-alpine
    restart: "no"
    working_dir: /workspace
    depends_on:
      mysql:
        condition: service_healthy
      relay:
        condition: service_healthy
    environment:
      NODE_ENV: development
      KILN_ENVIRONMENT: dev
      KILN_SENTRY_VERIFICATION_TOKEN: ${KILN_SENTRY_VERIFICATION_TOKEN:-}
    command:
      - /bin/sh
      - -lc
      - |
        corepack enable
        pnpm install --frozen-lockfile --ignore-scripts --filter web...
        pnpm rebuild esbuild
        if [ ! -f packages/contracts/dist/index.js ] || [ packages/contracts/src/index.ts -nt packages/contracts/dist/index.js ]; then
          pnpm --filter @workspace/contracts exec vp pack
        fi
        pnpm --filter web db:migrate
        exec pnpm --filter web dev --host 0.0.0.0
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health',{signal:AbortSignal.timeout(2500)}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 6
    labels:
      dev.orbstack.http-port: "3000"
    volumes: !override
      - .:/workspace
      - hearth-dev-node-modules:/workspace/node_modules
      - hearth-dev-web-node-modules:/workspace/apps/web/node_modules
      - hearth-dev-contracts-node-modules:/workspace/packages/contracts/node_modules
      - hearth-dev-ui-node-modules:/workspace/packages/ui/node_modules
      - hearth-dev-pnpm-store:/root/.local/share/pnpm/store

volumes:
  relay-dev-node-modules:
  relay-dev-app-node-modules:
  relay-dev-contracts-node-modules:
  relay-dev-pnpm-store:
  hearth-dev-node-modules:
  hearth-dev-web-node-modules:
  hearth-dev-contracts-node-modules:
  hearth-dev-ui-node-modules:
  hearth-dev-pnpm-store:
